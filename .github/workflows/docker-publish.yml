name: CI/CD Pipeline - Docker Publish

# 1. Tetikleyici (Trigger): Bu robotlar ne zaman uyanacak?
# main branch'ine her push (gönderim) yapıldığında çalışır.
on:
  push:
    branches: [ "main" ]

# 2. Çevresel Değişkenler: GitHub'ın kendi paket deposunu (ghcr.io) kullanacağız.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# 3. İşler (Jobs): Robotların yapacağı görevler dizisi.
jobs:
  build-and-push-image:
    # Hangi sanal bilgisayarda çalışsın? Ubuntu (Linux)
    runs-on: ubuntu-latest
    
    # GitHub Token yetkileri: Depoyu oku, Paket Alanına yazma yap.
    permissions:
      contents: read
      packages: write

    # 4. Adımlar (Steps)
    steps:
      # Adım 1: Yazdığımız kodları GitHub sunucusuna indir.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Adım 2: Python kur ve Kod Testlerini (CI) çalıştır.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies & Test
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
          pytest test_app.py

      # Adım 3: Docker sistemine GitHub kullanıcı adımızla giriş yap.
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Adım 3: İmaj ismini ve etiketlerini (latest) hazırla.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      # Adım 4: Yazdığımız Dockerfile'ı okuyarak imajı inşa et (Build) ve Buluta yükle (Push).
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
